schema_version: appspec.khu.ai/v1alpha1
kind: AIApp
metadata:
  name: sample-gpu-inference
  version: 0.1.0
artifact:
  type: package
  uri: s3://example-artifacts/sample-gpu-inference-0.1.0.tar.gz
entrypoint:
  command: ./run.sh
  args: ["--host=0.0.0.0", "--port=18081"]
runtime:
  type: gpu
  accelerator: nvidia
resources:
  cpu: "4"
  memory: 16Gi
  gpu: "1"
  storage: 20Gi
model_refs:
  - name: sample-model
    version: 0.1.0
    uri: s3://example-models/sample-model/
    mount_path: /opt/aiapp/models/sample-model
network:
  ports:
    - name: http
      app_port: 18081
      protocol: TCP
healthcheck:
  type: http
  path: /health
